# =============================================================================
# 宿主机 Nginx 反代示例（抖商学院 / TSDD 典型端口）
#
# 【实现目标】浏览器 http://tu2t0.com → Web 页（本机 82）；Android/iOS 填 http://tu2t0.com
#   且 SDK 请求 /v1/... → 后端（本机 8090）。依赖下面 tu2t0.com 中 location /v1/ 在 location / 之前。
#
# 前置：docker compose 已映射 web:82、manager:83、server:8090、minio:9000
#
# 使用步骤（Debian/Ubuntu）：
#   sudo apt install -y nginx
#   sudo cp conf.d-websocket-map.conf.example /etc/nginx/conf.d/websocket-map.conf
#   sudo cp host-reverse-proxy.conf.example /etc/nginx/sites-available/tsdd.conf
#   sudo ln -sf /etc/nginx/sites-available/tsdd.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # 若 80 与 default 冲突
#   sudo nginx -t && sudo systemctl reload nginx
#
# 云安全组 / 防火墙需放行 TCP 80、443（若启用 HTTPS）；MinIO 经反代后外网可只开 80/443。
# MinIO：为 minio.tu2t0.com（及控制台子域）配置 DNS A 记录；并把 .env 中 TS_MINIO_DOWNLOADURL
# 改为 http://minio.tu2t0.com（或上 HTTPS 后的 https://minio.tu2t0.com），与对外地址一致。
#
# HTTPS：certbot certonly --nginx -d tu2t0.com -d www.tu2t0.com … 后取消注释
# 下方 ssl 段并填写 ssl_certificate 路径，再 nginx -t && reload。
# =============================================================================

# ---- Web IM：域名 -> 本机 82（容器 web）----
# Android/iOS 用「主域 + HTTP、配置里不写 /v1」时：
#   在 App 里填：http://tu2t0.com 或 http://tu2t0.com/（不要手填 /v1）。
#   多数 SDK 会在内部拼出 http://tu2t0.com/v1/...，下面 location /v1/ 会转到 8090。
# 若你的客户端要求「API 根」必须是完整前缀且含路径，则用：http://tu2t0.com/v1/
# location /v1/ 必须写在 location / 之前。
# Web 浏览器仍走 location / -> :82；/api/v1/ 由容器内 Nginx 转发，与宿主机 /v1/ 可并存。
server {
    listen 80;
    listen [::]:80;
    server_name tu2t0.com www.tu2t0.com;

    client_max_body_size 1000m;

    location /v1/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header token             $http_token;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Token           $http_x_token;
        proxy_set_header X-Access-Token    $http_x_access_token;
        proxy_set_header appid             $http_appid;
        proxy_set_header package           $http_package;
        proxy_set_header os                $http_os;
        proxy_set_header model             $http_model;
        proxy_set_header version           $http_version;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:8090;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_pass http://127.0.0.1:82;
    }

    # 可选 HTTPS（Let's Encrypt 等）：
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/tu2t0.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tu2t0.com/privkey.pem;
}

# ---- 后台管理：houtai -> 本机 83（容器 manager）----
server {
    listen 80;
    listen [::]:80;
    server_name houtai.tu2t0.com;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_pass http://127.0.0.1:83;
    }
}

# ---- 可选：api 子域 -> 8090（与主域二选一；主域方案见上方 tu2t0.com 的 /v1/）----
server {
    listen 80;
    listen [::]:80;
    server_name api.tu2t0.com;

    client_max_body_size 1000m;
    client_body_buffer_size 128k;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        # 与 web 容器内 /api/ 反代一致，避免上传/鉴权头被丢
        proxy_set_header token             $http_token;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-Token           $http_x_token;
        proxy_set_header X-Access-Token    $http_x_access_token;
        proxy_set_header appid             $http_appid;
        proxy_set_header package           $http_package;
        proxy_set_header os                $http_os;
        proxy_set_header model             $http_model;
        proxy_set_header version           $http_version;
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:8090;
    }
}

# ---- MinIO S3 API：子域 -> 本机 9000（与 compose minio 端口映射一致）----
server {
    listen 80;
    listen [::]:80;
    server_name minio.tu2t0.com;

    ignore_invalid_headers off;
    client_max_body_size 1000m;
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_pass http://127.0.0.1:9000;
    }
}

# ---- MinIO 控制台：子域 -> 本机 9001（compose 中 console-address；需 WebSocket）----
server {
    listen 80;
    listen [::]:80;
    server_name minio-console.tu2t0.com;

    ignore_invalid_headers off;
    client_max_body_size 1000m;
    proxy_buffering off;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_connect_timeout 300;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_pass http://127.0.0.1:9001;
    }
}
